AutoName: Jotdown

Summary: Fichador acadêmico com leitor de PDF e exportação ABNT

Description: |-
  Jotdown é um fichador acadêmico 100% offline para estudantes e pesquisadores.

  Funcionalidades:
  * Leitor de PDF com renderização de alta qualidade (PDF.js)
  * Ferramentas de desenho: caneta, lápis, marca-texto e borracha
  * Anotações em post-it sobre qualquer ponto do documento
  * Captura de citações diretas com um toque
  * Metadados ABNT (livro, artigo, site)
  * Exportação do fichamento em .md, .txt e .pdf
  * Todos os dados ficam no dispositivo (IndexedDB) — sem nuvem, sem rastreamento

  O app não coleta nenhum dado do usuário, não requer conta, não faz requisições
  de rede durante o uso normal e funciona completamente offline.

