name: Android Release Build

on:
  push:
    tags:
      - 'v*' # Roda ao enviar uma tag começando com 'v', ex.: v3.1.4

jobs:
  build-and-release:
    name: Build, Release APK & Publish AAB
    runs-on: ubuntu-latest

    # Permissão necessária para o GitHub Actions criar o Release
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.keystore"

      # O Gradle assina APK e AAB sozinho (inclui zipalign).
      # apksigner nao funciona em AAB, por isso a assinatura e feita aqui.
      - name: Build signed APK + AAB (flavor full)
        env:
          KEYSTORE_FILE:     ${{ runner.temp }}/upload.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleFullRelease bundleFullRelease --no-daemon

      - name: Locate artifacts
        id: artifacts
        run: |
          echo "apk=$(find app/build/outputs/apk/full/release -name '*.apk' | head -1)" >> "$GITHUB_OUTPUT"
          echo "aab=$(find app/build/outputs/bundle/fullRelease -name '*.aab' | head -1)" >> "$GITHUB_OUTPUT"

      # Sobe o AAB para a faixa INTERNA como RASCUNHO.
      # Nada chega a usuarios ate voce promover manualmente no Play Console.
      - name: Publish AAB to Play Console (internal / draft)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: br.com.jotdown
          releaseFiles: ${{ steps.artifacts.outputs.aab }}
          track: internal
          status: draft
          mappingFile: app/build/outputs/mapping/fullRelease/mapping.txt

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.artifacts.outputs.apk }}
          generate_release_notes: true
