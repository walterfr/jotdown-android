name: Android Release Build

on:
  push:
    tags:
      - 'v*' # Esse fluxo vai rodar sempre que você enviar uma tag começando com 'v', tipo v2.0.0

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest

    # Permissão necessária para o GitHub Actions criar o Release
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Full Release APK
        # Vai compilar a versão "Full" (sem ser FOSS) em modo Release
        run: ./gradlew assembleFullRelease

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Decodifica o keystore
          echo $KEYSTORE_BASE64 | base64 -d > my.keystore
          
          # Encontra a ferramenta de assinatura do Android (build-tools 34.0.0)
          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools/34.0.0"
          
          # Otimiza o APK
          $BUILD_TOOLS_DIR/zipalign -v -p 4 app/build/outputs/apk/full/release/app-full-release-unsigned.apk app-full-release-aligned.apk
          
          # Assina o APK
          $BUILD_TOOLS_DIR/apksigner sign --ks my.keystore --ks-key-alias "$KEY_ALIAS" --ks-pass pass:"$KEYSTORE_PASSWORD" --key-pass pass:"$KEY_PASSWORD" --out app-full-release.apk app-full-release-aligned.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          files: app-full-release.apk
          generate_release_notes: true
