name: Android Release Build

on:
  push:
    tags:
      - 'v*' # Roda ao enviar uma tag começando com 'v', ex.: v3.1.4
  # Permite disparar manualmente a partir de qualquer branch, sem criar tag.
  workflow_dispatch:
    inputs:
      track:
        description: 'Faixa do Play Console'
        required: true
        default: internal
        type: choice
        options: [internal, alpha, beta]
      status:
        description: 'draft = aguarda promocao manual; completed = libera aos testadores'
        required: true
        default: draft
        type: choice
        options: [draft, completed]

jobs:
  build-and-release:
    name: Build, Release APK & Publish AAB
    runs-on: ubuntu-latest

    # Permissão necessária para o GitHub Actions criar o Release
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Dois canais, duas chaves distintas — ambas legitimas:
      #  - APK (GitHub/F-Droid): chave historica SHA1 12:FA:3C:7A...
      #    Trocar quebraria a atualizacao de quem instalou por fora da Play.
      #  - AAB (Play): chave de upload SHA1 E4:EE:B5:B3..., alias
      #    jotdown_upload, registrada no Play App Signing.
      - name: Decode keystores
        env:
          KEYSTORE_BASE64:      ${{ secrets.KEYSTORE_BASE64 }}
          PLAY_KEYSTORE_BASE64: ${{ secrets.PLAY_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64"      | base64 -d > "$RUNNER_TEMP/github.keystore"
          echo "$PLAY_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/play-upload.p12"

      # O Gradle assina e faz zipalign sozinho.
      # apksigner nao funciona em AAB, por isso a assinatura e feita aqui.
      - name: Build signed APK (chave GitHub/F-Droid)
        env:
          KEYSTORE_FILE:     ${{ runner.temp }}/github.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleFullRelease --no-daemon

      - name: Build signed AAB (chave de upload do Play)
        env:
          KEYSTORE_FILE:     ${{ runner.temp }}/play-upload.p12
          KEYSTORE_PASSWORD: ${{ secrets.PLAY_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.PLAY_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.PLAY_KEY_PASSWORD }}
        run: ./gradlew bundleFullRelease --no-daemon

      - name: Locate artifacts
        id: artifacts
        run: |
          echo "apk=$(find app/build/outputs/apk/full/release -name '*.apk' | head -1)" >> "$GITHUB_OUTPUT"
          echo "aab=$(find app/build/outputs/bundle/fullRelease -name '*.aab' | head -1)" >> "$GITHUB_OUTPUT"

      # Sobe o AAB para a faixa INTERNA como RASCUNHO.
      # Nada chega a usuarios ate voce promover manualmente no Play Console.
      - name: Publish AAB to Play Console (internal / draft)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: br.com.jotdown
          releaseFiles: ${{ steps.artifacts.outputs.aab }}
          tracks: ${{ github.event.inputs.track || 'internal' }}
          status: ${{ github.event.inputs.status || 'draft' }}
          mappingFile: app/build/outputs/mapping/fullRelease/mapping.txt

      # So cria Release no GitHub quando disparado por tag.
      - name: Create GitHub Release and Upload APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.artifacts.outputs.apk }}
          generate_release_notes: true
