plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.google.devtools.ksp'
    id 'org.jetbrains.kotlin.plugin.compose'
}

android {
    dependenciesInfo {
        includeInApk = false
        includeInBundle = false
    }
    namespace 'br.com.jotdown'
    compileSdk 34

        flavorDimensions "version"
    productFlavors {
        full { dimension "version" }
        foss { dimension "version"; versionNameSuffix "-FOSS" }
    }

    defaultConfig {
        applicationId 'br.com.jotdown'
        minSdk 26
        targetSdk 34
        versionCode 2
        versionName '2.0.0'

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitProcessor'

        // Reduz tamanho: inclui apenas ABIs necessÃƒÆ’Ã‚Â¡rias
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
        }
    }

    // Remove arquivos desnecessÃƒÆ’Ã‚Â¡rios do JAR/AAR que inflam a APK
    packaging {
        resources {
            excludes += [
                'META-INF/DEPENDENCIES',
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
                'META-INF/*.kotlin_module',
                'META-INF/INDEX.LIST',
                'META-INF/io.netty.versions.properties',
                'DebugProbesKt.bin'
            ]
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        compose true
        buildConfig false   // NÃƒÆ’Ã‚Â£o usamos BuildConfig no cÃƒÆ’Ã‚Â³digo
    }

}

dependencies {
    // Compose BOM
    implementation platform('androidx.compose:compose-bom:2024.05.00')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'androidx.activity:activity-compose:1.9.0'

    // Navigation
    implementation 'androidx.navigation:navigation-compose:2.7.7'

    // ViewModel
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-compose:2.7.0'

    // Room
    implementation 'androidx.room:room-runtime:2.6.1'
    implementation 'androidx.room:room-ktx:2.6.1'
    ksp 'androidx.room:room-compiler:2.6.1'

    // Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'

    // AndroidX Core
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'

    // OCR ÃƒÂ¢Ã¢â€šÂ¬Ã¢â‚¬Â Google ML Kit
    fullImplementation 'com.google.mlkit:text-recognition:16.0.1'

    // Debug
    debugImplementation 'androidx.compose.ui:ui-tooling'
}
